<div class="login-page">
  <canvas id="starfield" class="starfield-canvas"></canvas>
  <div class="star-overlay" aria-hidden="true"></div>
  <section class="login-shell">
    <mat-card class="login-card">
      <mat-card-header class="login-header">
        <mat-card-title>{{ i18nKeys.login.adminLogin | translate }}</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="doLogin()" class="login-form">
          <mat-form-field appearance="outline" class="glow-field">
            <mat-label>{{ i18nKeys.login.username | translate }}</mat-label>
            <input matInput type="text" [formControl]="userName"
              [placeholder]="i18nKeys.login.usernamePlaceholder | translate">
            @if (userName.invalid && userName.touched) {
            <mat-error>{{ getValidatorMessage(userName) }}</mat-error>
            }
          </mat-form-field>

          <mat-form-field appearance="outline" class="glow-field">
            <mat-label>{{ i18nKeys.login.password | translate }}</mat-label>
            <input type="password" matInput [placeholder]="i18nKeys.login.passwordPlaceholder | translate"
              [formControl]="password">
            @if (password.invalid && password.touched) {
            <mat-error>{{ getValidatorMessage(password) }}</mat-error>
            }
          </mat-form-field>

          <div class="login-btn-row">
            <button mat-flat-button type="submit" class="login-btn" [disabled]="loginForm.invalid || isLoading()"              >
              {{ i18nKeys.login.login | translate }}
            </button>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  </section>
</div>
